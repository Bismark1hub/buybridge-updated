<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users — BuyBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="dashboard-page">
    <div class="dashboard-header"><h1>Users</h1></div>
    <div class="filters">
      <select id="role-filter">
        <option value="">All Roles</option>
        <option value="buyer">Buyer</option>
        <option value="seller">Seller</option>
        <option value="admin">Admin</option>
      </select>
      <input type="text" id="search-input" placeholder="Search by name or email...">
    </div>
    <div id="loading-state"><p>Loading users...</p></div>
    <div class="table-wrapper" id="table-wrapper" style="display: none;">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th></tr></thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </main>
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/admin-users.js"></script>
</body>
</html>
