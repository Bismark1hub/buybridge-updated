<!-- add-product.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product — BuyBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="auth-page">
    <form id="product-form" class="auth-card">
      <h1 id="form-title">Add Product</h1>
      <label for="name">Product Name</label>
      <input type="text" id="name" required>

      <label for="description">Description</label>
      <textarea id="description" required></textarea>

      <label for="price">Price (GHS)</label>
      <input type="number" id="price" min="0" step="0.01" required>

      <label for="quantity_available">Quantity Available</label>
      <input type="number" id="quantity_available" min="0" required>

      <label for="category_id">Category</label>
      <select id="category_id" required></select>

      <label for="image_file">Product Image</label>
<input type="file" id="image_file" accept="image/*">
<img id="image_preview" style="display:none; max-width: 200px; margin-top: var(--space-sm);">

      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Add Product</button>
    </form>
  </main>
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navigation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
  <script src="js/product-form.js"></script>

</body>
</html>
