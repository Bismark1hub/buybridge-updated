<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Settings — BuyBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="auth-page">
    <form id="settings-form" class="auth-card">
      <h1>Platform Settings</h1>
      <label for="platform_fee_percent">Platform Fee (%)</label>
      <input type="number" id="platform_fee_percent" min="0" max="100" step="0.1" required>
      <button type="submit" class="btn btn-primary btn-full">Save Setting</button>
    </form>
  </main>
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/admin-settings.js"></script>
</body>
</html>
