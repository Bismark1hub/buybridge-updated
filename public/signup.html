<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — BuyBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Sign Up</h1>
      <form id="signup-form">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="phone">Phone</label>
        <input type="text" id="phone" required placeholder="0XXXXXXXXX">

        <label for="password">Password</label>
        <input type="password" id="password" required minlength="8">

        <label for="role">I am a...</label>
        <select id="role" required>
          <option value="buyer">Buyer</option>
          <option value="seller">Seller</option>
        </select>

        <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const full_name = document.getElementById('full_name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;

      try {
        const result = await apiRequest('auth-signup', 'POST', { email, password, full_name, phone, role }, false);
        saveSession(result.token, result.user);
        showToast('Account created!', 'success');
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 800);
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
