<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — BuyBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="cart-page">
    <h1>Your Cart</h1>
    <div id="empty-cart-state" style="display: none;" class="empty-state">
      <p>Your cart is empty.</p>
      <a href="browse.html" class="btn btn-secondary">Browse Products</a>
    </div>
    <div id="cart-content" style="display: none;">
      <div id="cart-items" class="cart-items">
        <!-- filled in by cart-page.js -->
      </div>
      <div class="cart-summary">
        <p class="cart-total">Total: <span id="cart-total-amount"></span></p>
        <button id="checkout-btn" class="btn btn-primary btn-full">Proceed to Checkout</button>
      </div>
    </div>
  </main>
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
