<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — BuyBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="dashboard-page">
    <div class="dashboard-header">
      <h1>Notifications</h1>
      <button id="mark-all-btn" class="btn btn-secondary btn-sm">Mark All Read</button>

    <div id="empty-state" style="display: none;" class="empty-state"><p>No notifications.</p></div>
    <div id="notifications-list" style="display: none;"></div>
  </main>
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/notifications.js"></script>
</body>
</html>
