<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Orders — BuyBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="dashboard-page">
    <div class="dashboard-header"><h1>Orders to Fulfill</h1></div>
    <div id="loading-state"><p>Loading orders...</p></div>
    <div id="empty-state" style="display: none;" class="empty-state"><p>No orders yet.</p></div>
    <div class="table-wrapper" id="orders-table-wrapper" style="display: none;">
      <table>
        <thead>
          <tr><th>Order #</th><th>Total</th><th>Status</th><th>Payment</th><th></th></tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>
  </main>
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/seller-orders.js"></script>
</body>
</html>
