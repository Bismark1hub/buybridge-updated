<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <div class="detail-image" id="productImage">
      <div class="image-placeholder large">📱</div>
    </div>

    <div class="detail-info">
      <span class="tagline-subtle">Buy with confidence</span>
      <h1 class="detail-name" id="productName">Loading...</h1>
      <p class="detail-price" id="productPrice">GHS ---</p>

      <div class="detail-seller">
        <div class="seller-avatar">🏪</div>
        <div class="seller-info">
          <span class="sold-by">Sold by</span>
          <a href="#" class="seller-name-link" id="sellerName">Loading...</a>
          <span class="seller-rating" id="sellerRating">⭐ ---</span>
        </div>
        <a href="#" class="view-store-btn" id="viewStoreBtn">View Store</a>
      </div>

      <div class="detail-description">
        <button class="description-toggle" onclick="toggleDescription()">
          <h3>Description</h3>
          <span class="toggle-arrow">▼</span>
        </button>
        <div class="description-content" id="descriptionContent">
          <p id="productDescription">Loading...</p>
        </div>
      </div>

      <div class="trust-badge">
        <span class="trust-icon">🛡️</span>
        <div>
          <strong>Funds held securely in BuyBridge escrow</strong>
          <p style="margin-top:4px;">Payment is only released to seller after you confirm delivery</p>
        </div>
      </div>
    </div>

  </main>

  <div class="bottom-actions">
    <div class="quantity-selector">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-number" id="qtyDisplay">1</span>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <button class="btn-add-cart" onclick="addToCart()">Add to Cart</button>
    <button class="btn-buy-now" onclick="buyNow()">Buy Now</button>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    
    let product = null;
    let quantity = 1;

    initHeader(null, '../index.html');
    updateAllCartBadges();

    async function loadProduct() {
      if (!productId) {
        showPlaceholderProduct();
        return;
      }

      try {
        const data = await apiGetProduct(productId);
        product = data.product;
        displayProduct(product);
      } catch (error) {
        showPlaceholderProduct();
      }
    }

    function displayProduct(p) {
      document.getElementById('productName').textContent = p.name;
      document.getElementById('productPrice').textContent = `GHS ${parseFloat(p.price).toLocaleString()}`;
      document.getElementById('productDescription').textContent = p.description || 'No description available.';
      document.getElementById('sellerName').textContent = p.seller_name || 'Unknown Seller';
      document.getElementById('sellerRating').textContent = `⭐ ${p.rating || 'New'}`;
      
      if (p.seller_id) {
        document.getElementById('viewStoreBtn').href = `seller-storefront.html?user_id=${p.seller_id}`;
        document.getElementById('sellerName').href = `seller-storefront.html?user_id=${p.seller_id}`;
      }

      if (p.image_url) {
        document.getElementById('productImage').innerHTML = `<img src="${p.image_url}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">`;
      }

      document.title = `${p.name} - BuyBridge`;
    }

    function showPlaceholderProduct() {
      document.getElementById('productName').textContent = 'iPhone 13 Pro - 256GB';
      document.getElementById('productPrice').textContent = 'GHS 8,500';
      document.getElementById('productDescription').textContent = 'Brand new iPhone 13 Pro with 256GB storage. Factory unlocked. Includes original charger and cable. 1-year warranty. Color: Graphite.\n\n📍 Pickup: Available in Accra, East Legon.\n🚗 Delivery: Rider delivery available at buyers cost.';
      document.getElementById('sellerName').textContent = 'TechHub Ghana';
      document.getElementById('sellerRating').textContent = '⭐ 4.8';
    }

    function changeQty(change) {
      quantity = Math.max(1, quantity + change);
      document.getElementById('qtyDisplay').textContent = quantity;
    }

    function toggleDescription() {
      const content = document.getElementById('descriptionContent');
      const arrow = document.querySelector('.toggle-arrow');
      if (content.style.display === 'none') {
        content.style.display = 'block';
        arrow.textContent = '▼';
      } else {
        content.style.display = 'none';
        arrow.textContent = '▶';
      }
    }

    function addToCart() {
      if (!isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      const cart = JSON.parse(localStorage.getItem('buybridge_cart') || '[]');
      const productToAdd = product || { id: 'demo', name: 'iPhone 13 Pro - 256GB', price: 8500 };
      
      const existing = cart.find(item => item.id === productToAdd.id);
      if (existing) {
        existing.quantity += quantity;
      } else {
        cart.push({
          id: productToAdd.id,
          name: productToAdd.name,
          price: productToAdd.price,
          quantity: quantity
        });
      }

      localStorage.setItem('buybridge_cart', JSON.stringify(cart));
      updateAllCartBadges();
      showToast('Added to cart!', 'success');
    }

    function buyNow() {
      addToCart();
      window.location.href = 'checkout.html';
    }

    loadProduct();
  </script>

</body>
</html>
