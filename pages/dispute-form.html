<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <div class="dispute-order-ref">
      <span class="ref-label">Order Reference</span>
      <span class="ref-number" id="orderRef">#------</span>
    </div>

    <div class="warning-banner">
      <span>⚠️</span>
      <p>Funds will be frozen until this issue is resolved by BuyBridge admin</p>
    </div>

    <div class="form-section">
      <div class="form-group">
        <label class="form-label">Issue Type *</label>
        <select class="form-input" id="issueType">
          <option value="">Select issue type</option>
          <option value="not_received">Item not received</option>
          <option value="damaged">Item damaged</option>
          <option value="wrong_item">Wrong item delivered</option>
          <option value="fake">Item is counterfeit</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Describe the Issue *</label>
        <textarea class="form-input form-textarea" id="issueDescription" placeholder="Please describe what happened in detail..."></textarea>
      </div>

      <button class="btn-submit-dispute" onclick="submitDispute()">Submit Dispute</button>
    </div>

    <div class="trust-badge cart-trust" style="margin-top: 16px;">
      <span class="trust-icon">🛡️</span>
      <span>BuyBridge protects both buyers and sellers</span>
    </div>

  </main>

  <div class="modal-overlay" id="disputeSuccessModal" style="display: none;">
    <div class="modal-card success">
      <div class="success-icon">📋</div>
      <h3 class="modal-title">Dispute Submitted</h3>
      <p class="modal-message" id="disputeSuccessMsg">Your dispute has been filed.</p>
      <p class="modal-message sub">Our admin team will review it within 24 hours.</p>
      <a href="../index.html" class="btn-checkout" style="margin-top: 16px; display: block;">Back to Home</a>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('order_id');

    initHeader('Report Issue', orderId ? `order-tracking.html?id=${orderId}` : '../index.html');

    if (orderId) {
      document.getElementById('orderRef').textContent = `#${orderId}`;
    }

    async function submitDispute() {
      const issueType = document.getElementById('issueType').value;
      const description = document.getElementById('issueDescription').value.trim();

      if (!issueType || !description) {
        showToast('Please fill in all required fields', 'warning');
        return;
      }

      try {
        if (orderId) {
          await apiRaiseDispute({
            order_id: orderId,
            issue_type: issueType,
            description: description
          });
          document.getElementById('disputeSuccessMsg').textContent = `Your dispute for Order #${orderId} has been filed.`;
        }
        document.getElementById('disputeSuccessModal').style.display = 'flex';
      } catch (error) {}
    }
  </script>

</body>
</html>
