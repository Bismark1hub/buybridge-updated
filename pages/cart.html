<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <div class="cart-items" id="cartItems">
      <p style="text-align: center; color: var(--text-light); padding: 40px;">Your cart is empty</p>
    </div>

    <div class="cart-section" id="addressSection" style="display: none;">
      <h3 class="cart-section-title">📍 Delivery Address</h3>
      <div class="address-box">
        <input type="text" class="form-input" id="deliveryAddress" placeholder="Enter your delivery address" style="flex:1;">
        <button class="address-change-btn" onclick="saveAddress()">Save</button>
      </div>
    </div>

    <div class="cart-section" id="summarySection" style="display: none;">
      <h3 class="cart-section-title">Order Summary</h3>
      <div class="summary-rows">
        <div class="summary-row">
          <span>Subtotal (<span id="itemCount">0</span> items)</span>
          <span id="subtotal">GHS 0</span>
        </div>
        <div class="summary-row">
          <span>Platform Fee (5%)</span>
          <span id="platformFee">GHS 0</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total">GHS 0</span>
        </div>
      </div>
    </div>

    <div class="trust-badge cart-trust">
      <span class="trust-icon">🛡️</span>
      <span>Your payment is secure with BuyBridge escrow</span>
    </div>

  </main>

  <div class="bottom-checkout" id="checkoutBar" style="display: none;">
    <div class="checkout-total">
      <span class="checkout-label">Total</span>
      <span class="checkout-amount" id="checkoutTotal">GHS 0</span>
    </div>
    <button class="btn-checkout" onclick="proceedToCheckout()">Proceed to Checkout</button>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    let cart = [];

    initHeader('My Cart', '../index.html');
    updateAllCartBadges();

    function loadCart() {
      cart = JSON.parse(localStorage.getItem('buybridge_cart') || '[]');
      
      if (cart.length === 0) {
        document.getElementById('cartItems').innerHTML = '<p style="text-align: center; color: var(--text-light); padding: 40px;">🛒 Your cart is empty</p>';
        return;
      }

      document.getElementById('addressSection').style.display = 'block';
      document.getElementById('summarySection').style.display = 'block';
      document.getElementById('checkoutBar').style.display = 'flex';

      document.getElementById('cartItems').innerHTML = cart.map((item, index) => `
        <div class="cart-item">
          <div class="cart-item-image"><div class="image-placeholder small">📦</div></div>
          <div class="cart-item-details">
            <h3 class="cart-item-name">${item.name}</h3>
            <p class="cart-item-price">GHS ${parseFloat(item.price).toLocaleString()}</p>
            <div class="cart-item-qty">
              <button class="qty-btn-sm" onclick="updateQty(${index}, -1)">−</button>
              <span>${item.quantity}</span>
              <button class="qty-btn-sm" onclick="updateQty(${index}, 1)">+</button>
            </div>
          </div>
          <button class="cart-item-remove" onclick="removeItem(${index})">🗑️</button>
        </div>
      `).join('');

      const savedAddress = localStorage.getItem('buybridge_address');
      if (savedAddress) {
        document.getElementById('deliveryAddress').value = savedAddress;
      }

      updateSummary();
    }

    function updateSummary() {
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const fee = subtotal * 0.05;
      const total = subtotal + fee;
      const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);

      document.getElementById('itemCount').textContent = itemCount;
      document.getElementById('subtotal').textContent = `GHS ${subtotal.toLocaleString()}`;
      document.getElementById('platformFee').textContent = `GHS ${fee.toLocaleString()}`;
      document.getElementById('total').textContent = `GHS ${total.toLocaleString()}`;
      document.getElementById('checkoutTotal').textContent = `GHS ${total.toLocaleString()}`;
    }

    function updateQty(index, change) {
      cart[index].quantity = Math.max(1, cart[index].quantity + change);
      localStorage.setItem('buybridge_cart', JSON.stringify(cart));
      loadCart();
      updateAllCartBadges();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem('buybridge_cart', JSON.stringify(cart));
      loadCart();
      updateAllCartBadges();
    }

    function saveAddress() {
      const address = document.getElementById('deliveryAddress').value.trim();
      if (address) {
        localStorage.setItem('buybridge_address', address);
        showToast('Address saved!', 'success');
      }
    }

    function proceedToCheckout() {
      if (!isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      const address = document.getElementById('deliveryAddress').value.trim();
      if (!address) {
        showToast('Please enter a delivery address', 'warning');
        return;
      }

      localStorage.setItem('buybridge_address', address);
      window.location.href = 'checkout.html';
    }

    loadCart();
  </script>

</body>
</html>
