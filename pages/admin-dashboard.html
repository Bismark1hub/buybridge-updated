<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <h2 class="admin-greeting">Welcome, Admin</h2>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">👥</span>
        <span class="stat-value" id="totalUsers">--</span>
        <span class="stat-label">Total Users</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📦</span>
        <span class="stat-value" id="totalOrders">--</span>
        <span class="stat-label">Total Orders</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">💰</span>
        <span class="stat-value" id="totalRevenue">GHS --</span>
        <span class="stat-label">Total Revenue</span>
      </div>
      <div class="stat-card alert">
        <span class="stat-icon">⚠️</span>
        <span class="stat-value" id="pendingDisputes">--</span>
        <span class="stat-label">Pending Disputes</span>
      </div>
    </div>

    <div class="dashboard-tabs admin-tabs">
      <button class="tab-btn active" onclick="switchAdminTab('overview')">Overview</button>
      <button class="tab-btn" onclick="switchAdminTab('users')">Users</button>
      <button class="tab-btn" onclick="switchAdminTab('sellers')">Sellers</button>
      <button class="tab-btn" onclick="switchAdminTab('disputes')">Disputes</button>
      <button class="tab-btn" onclick="switchAdminTab('settings')">Settings</button>
    </div>

    <div class="tab-content" id="overviewTab">
      <div class="admin-section">
        <h3 class="admin-section-title">Recent Orders</h3>
        <div class="admin-table" id="recentOrders">
          <p style="color: var(--text-light); padding: 12px;">Loading...</p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="usersTab" style="display: none;">
      <div class="admin-section">
        <h3 class="admin-section-title">All Users</h3>
        <div class="admin-table" id="usersTable">
          <p style="color: var(--text-light); padding: 12px;">Loading...</p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="sellersTab" style="display: none;">
      <div class="admin-section">
        <h3 class="admin-section-title">Pending Seller Approvals</h3>
        <div class="approval-list" id="pendingApprovals">
          <p style="color: var(--text-light); padding: 12px;">Loading...</p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="disputesTab" style="display: none;">
      <div class="admin-section">
        <h3 class="admin-section-title">Active Disputes</h3>
        <div class="dispute-list" id="disputesList">
          <p style="color: var(--text-light); padding: 12px;">Loading...</p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="settingsTab" style="display: none;">
      <div class="admin-section">
        <h3 class="admin-section-title">Platform Settings</h3>
        
        <div class="settings-group">
          <label class="settings-label">Commission Rate (%)</label>
          <input type="number" class="settings-input" id="commissionRate" value="5" min="1" max="20">
        </div>

        <div class="settings-group">
          <label class="settings-label">Auto-Release Timer (Hours)</label>
          <input type="number" class="settings-input" id="autoRelease" value="48" min="1" max="168">
        </div>

        <div class="settings-group">
          <label class="settings-label">Moolre API Key</label>
          <input type="password" class="settings-input" id="apiKey" placeholder="Enter API key...">
        </div>

        <div class="settings-group">
          <label class="settings-label">Support Email</label>
          <input type="email" class="settings-input" id="supportEmail" value="support@buybridge.com">
        </div>

        <button class="btn-save-settings" onclick="saveSettings()">Save Settings</button>
      </div>
    </div>

    <div class="trust-badge cart-trust" style="margin: 16px 0;">
      <span class="trust-icon">🛡️</span>
      <span>BuyBridge is protected by Moolre escrow</span>
    </div>

  </main>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    if (!isLoggedIn() || getUserRole() !== 'admin') {
      window.location.href = 'login.html';
    }

    initHeader('Admin Dashboard', null);

    function switchAdminTab(tab) {
      ['overview', 'users', 'sellers', 'disputes', 'settings'].forEach(t => {
        document.getElementById(t + 'Tab').style.display = 'none';
      });
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tab + 'Tab').style.display = 'block';
      const tabIndex = ['overview', 'users', 'sellers', 'disputes', 'settings'].indexOf(tab);
      document.querySelectorAll('.tab-btn')[tabIndex].classList.add('active');

      if (tab === 'users') loadUsers();
      if (tab === 'disputes') loadDisputes();
    }

    async function loadUsers() {
      try {
        const data = await apiListUsers();
        const users = data.users || [];
        document.getElementById('totalUsers').textContent = users.length;
        
        document.getElementById('usersTable').innerHTML = `
          <div class="admin-table-row header">
            <span>Name</span><span>Role</span><span>Joined</span><span>Action</span>
          </div>
          ${users.map(u => `
            <div class="admin-table-row">
              <span>${u.full_name}</span>
              <span class="role-${u.role === 'seller' ? 'seller' : 'buyer'}">${u.role}</span>
              <span>${new Date(u.created_at).toLocaleDateString()}</span>
              <button class="btn-sm view">View</button>
            </div>
          `).join('')}
        `;
      } catch (error) {}
    }

    async function loadDisputes() {
      try {
        const data = await apiListDisputes();
        const disputes = data.disputes || [];
        document.getElementById('pendingDisputes').textContent = disputes.length;

        document.getElementById('disputesList').innerHTML = disputes.length === 0
          ? '<p style="color: var(--text-light); padding: 12px;">No active disputes</p>'
          : disputes.map(d => `
            <div class="dispute-card">
              <div class="dispute-header">
                <span class="dispute-id">Order #${d.order_id?.substring(0,8)}</span>
                <span class="status-disputed">${d.status}</span>
              </div>
              <div class="dispute-body">
                <p><strong>Issue:</strong> ${d.issue_type}</p>
                <p class="dispute-desc">${d.description}</p>
              </div>
              <div class="dispute-actions">
                <button class="btn-refund" onclick="resolveDispute('${d.id}', 'resolved_buyer')">Refund Buyer</button>
                <button class="btn-release" onclick="resolveDispute('${d.id}', 'resolved_seller')">Release to Seller</button>
              </div>
            </div>
          `).join('');
      } catch (error) {}
    }

    async function resolveDispute(disputeId, outcome) {
      try {
        await apiResolveDispute({ dispute_id: disputeId, outcome, resolution_notes: 'Resolved by admin' });
        showToast('Dispute resolved', 'success');
        loadDisputes();
      } catch (error) {}
    }

    async function saveSettings() {
      try {
        await apiUpdateSettings('commission_rate', document.getElementById('commissionRate').value);
        await apiUpdateSettings('auto_release_hours', document.getElementById('autoRelease').value);
        showToast('Settings saved', 'success');
      } catch (error) {}
    }

    loadUsers();
  </script>

</body>
</html>
