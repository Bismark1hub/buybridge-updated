<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <div class="dashboard-tabs" style="margin: 12px -16px;">
      <button class="tab-btn active" onclick="filterOrders('all', this)">All</button>
      <button class="tab-btn" onclick="filterOrders('pending', this)">Active</button>
      <button class="tab-btn" onclick="filterOrders('completed', this)">Completed</button>
      <button class="tab-btn" onclick="filterOrders('disputed', this)">Disputed</button>
    </div>

    <div class="order-list" id="ordersList">
      <p style="text-align: center; color: var(--text-light); padding: 40px;">Loading orders...</p>
    </div>

  </main>

  <div id="bottomNav"></div>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
    }

    initHeader('My Orders', null);
    document.getElementById('bottomNav').innerHTML = getBuyerBottomNav('orders');

    let allOrders = [];

    async function loadOrders() {
      try {
        const data = await apiGetMyOrders();
        allOrders = data.orders || [];
        displayOrders(allOrders);
      } catch (error) {
        showPlaceholderOrders();
      }
    }

    function displayOrders(orders) {
      if (orders.length === 0) {
        document.getElementById('ordersList').innerHTML = `
          <div style="text-align: center; padding: 40px;">
            <p style="font-size: 48px; margin-bottom: 12px;">📋</p>
            <p style="color: var(--text-light);">No orders found</p>
            <a href="../index.html" class="btn-checkout" style="display: inline-block; margin-top: 16px;">Start Shopping</a>
          </div>
        `;
        return;
      }

      document.getElementById('ordersList').innerHTML = orders.map(order => {
        const statusClass = order.status === 'completed' ? 'status-completed' 
          : order.status === 'disputed' ? 'status-disputed' 
          : order.status === 'cancelled' ? 'status-new'
          : 'status-preparing';
        
        const paymentClass = order.payment_status === 'released' ? 'status-completed'
          : order.payment_status === 'escrowed' ? 'status-preparing'
          : order.payment_status === 'refunded' ? 'status-disputed'
          : 'status-new';

        return `
          <a href="order-tracking.html?id=${order.id}" class="order-card" style="text-decoration: none; color: inherit; display: block;">
            <div class="order-card-header">
              <span class="order-id">#${order.order_number}</span>
              <div style="display: flex; gap: 6px;">
                <span class="order-status ${statusClass}">${order.status}</span>
                <span class="order-status ${paymentClass}">${order.payment_status}</span>
              </div>
            </div>
            <div class="order-card-body">
              <span>${order.product_name || 'Product'} ×${order.quantity || 1}</span>
              <span class="order-amount">GHS ${parseFloat(order.total || 0).toLocaleString()}</span>
            </div>
            <div class="order-card-footer">
              <span class="order-buyer">${new Date(order.created_at).toLocaleDateString()}</span>
              <span style="font-size: 11px; color: var(--primary);">View Details →</span>
            </div>
          </a>
        `;
      }).join('');
    }

    function filterOrders(filter, element) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');

      if (filter === 'all') {
        displayOrders(allOrders);
      } else {
        const filtered = allOrders.filter(o => o.status === filter);
        displayOrders(filtered);
      }
    }

    function showPlaceholderOrders() {
      allOrders = [
        { id: '1', order_number: 'BB2026', status: 'paid', payment_status: 'escrowed', product_name: 'iPhone 13 Pro', quantity: 1, total: 8500, created_at: '2026-07-03' },
        { id: '2', order_number: 'BB2025', status: 'completed', payment_status: 'released', product_name: 'Nike Air Max', quantity: 2, total: 2400, created_at: '2026-07-01' },
        { id: '3', order_number: 'BB2024', status: 'disputed', payment_status: 'escrowed', product_name: 'Perfume', quantity: 1, total: 950, created_at: '2026-06-28' }
      ];
      displayOrders(allOrders);
    }

    loadOrders();
  </script>

</body>
</html>
