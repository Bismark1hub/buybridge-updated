<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <div class="store-banner" id="storeBanner">
      <div class="store-avatar-lg">🏪</div>
      <div>
        <h2 class="store-name-lg" id="storeName">My Store</h2>
        <span class="store-rating" id="storeRating">⭐ --</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">💰</span>
        <span class="stat-value" id="totalSales">GHS 0</span>
        <span class="stat-label">Total Sales</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📦</span>
        <span class="stat-value" id="totalOrders">0</span>
        <span class="stat-label">Orders</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🏷️</span>
        <span class="stat-value" id="totalProducts">0</span>
        <span class="stat-label">Products</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">⏳</span>
        <span class="stat-value" id="pendingPayout">GHS 0</span>
        <span class="stat-label">Pending Payout</span>
      </div>
    </div>

    <div class="dashboard-tabs">
      <button class="tab-btn active" onclick="switchTab('products')">Products</button>
      <button class="tab-btn" onclick="switchTab('orders')">Orders</button>
      <button class="tab-btn" onclick="switchTab('earnings')">Earnings</button>
    </div>

    <div class="tab-content" id="productsTab">
      <div class="product-list" id="productList">
        <p style="color: var(--text-light); text-align: center; padding: 20px;">Loading products...</p>
      </div>
      <button class="btn-add-product" onclick="window.location.href='add-product.html'">+ Add New Product</button>
    </div>

    <div class="tab-content" id="ordersTab" style="display: none;">
      <div class="order-list" id="orderList">
        <p style="color: var(--text-light); text-align: center; padding: 20px;">Loading orders...</p>
      </div>
    </div>

    <div class="tab-content" id="earningsTab" style="display: none;">
      <div class="earnings-summary">
        <div class="earning-row"><span>Total Earned</span><span class="earning-amount" id="earnedTotal">GHS 0</span></div>
        <div class="earning-row"><span>Paid Out</span><span class="earning-amount paid" id="paidOut">GHS 0</span></div>
        <div class="earning-row"><span>Pending</span><span class="earning-amount pending" id="earnedPending">GHS 0</span></div>
      </div>
    </div>

    <div class="trust-badge cart-trust" style="margin: 16px 0;">
      <span class="trust-icon">🛡️</span>
      <span>Get paid securely through BuyBridge escrow</span>
    </div>

  </main>

  <div id="bottomNav"></div>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    if (!isLoggedIn() || getUserRole() !== 'seller') {
      window.location.href = 'login.html';
    }

    initHeader('Seller Dashboard', null);
    document.getElementById('bottomNav').innerHTML = getSellerBottomNav('dashboard');

    function switchTab(tab) {
      ['products', 'orders', 'earnings'].forEach(t => {
        document.getElementById(t + 'Tab').style.display = 'none';
      });
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tab + 'Tab').style.display = 'block';
      const tabIndex = ['products', 'orders', 'earnings'].indexOf(tab);
      document.querySelectorAll('.tab-btn')[tabIndex].classList.add('active');
    }

    async function loadDashboard() {
      try {
        const user = getUser();
        document.getElementById('storeName').textContent = user.full_name || 'My Store';

        const productsData = await apiListProducts();
        const myProducts = (productsData.products || []).filter(p => p.seller_id === user.id);
        document.getElementById('totalProducts').textContent = myProducts.length;

        document.getElementById('productList').innerHTML = myProducts.length === 0 
          ? '<p style="color: var(--text-light); text-align: center; padding: 20px;">No products yet. Add your first product!</p>'
          : myProducts.map(p => `
            <div class="product-list-item">
              <div class="product-list-image"><div class="image-placeholder small">📦</div></div>
              <div class="product-list-info">
                <span class="product-list-name">${p.name}</span>
                <span class="product-list-price">GHS ${parseFloat(p.price).toLocaleString()}</span>
                <span class="product-list-stock">Stock: ${p.quantity_available || 0}</span>
              </div>
              <div class="product-list-actions">
                <button class="action-btn edit" onclick="window.location.href='edit-product.html?id=${p.id}'">✏️</button>
                <button class="action-btn delete" onclick="deleteProduct('${p.id}')">🗑️</button>
              </div>
            </div>
          `).join('');

        const ordersData = await apiGetMyOrders();
        const orders = ordersData.orders || [];
        document.getElementById('totalOrders').textContent = orders.length;

        document.getElementById('orderList').innerHTML = orders.length === 0
          ? '<p style="color: var(--text-light); text-align: center; padding: 20px;">No orders yet.</p>'
          : orders.map(o => `
            <div class="order-card">
              <div class="order-card-header">
                <span class="order-id">#${o.order_number}</span>
                <span class="order-status status-${o.status === 'completed' ? 'completed' : o.status === 'disputed' ? 'disputed' : 'new'}">${o.status}</span>
              </div>
              <div class="order-card-body">
                <span>${o.product_name || 'Product'} ×${o.quantity}</span>
                <span class="order-amount">GHS ${parseFloat(o.total).toLocaleString()}</span>
              </div>
              <div class="order-card-footer">
                <span class="order-buyer">Buyer: ${o.buyer_name || 'Customer'}</span>
                ${o.status === 'paid' ? '<button class="btn-ready-order" onclick="sendOTP(\'' + o.id + '\')">Send OTP</button>' : ''}
              </div>
            </div>
          `).join('');

      } catch (error) {
        showToast('Failed to load dashboard', 'error');
      }
    }

    async function deleteProduct(id) {
      if (confirm('Delete this product?')) {
        try {
          await apiUpdateProduct({ productId: id, status: 'inactive' });
          showToast('Product removed', 'success');
          loadDashboard();
        } catch (error) {}
      }
    }

    async function sendOTP(orderId) {
      try {
        await apiSendOTP(orderId);
        showToast('OTP sent to buyer', 'success');
      } catch (error) {}
    }

    loadDashboard();
  </script>

</body>
</html>
