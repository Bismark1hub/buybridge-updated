<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <div class="profile-header">
      <div class="profile-avatar">👤</div>
      <h2 class="profile-name" id="profileName">Loading...</h2>
      <span class="profile-role" id="profileRole">--</span>
    </div>

    <div class="profile-section">
      <h3 class="profile-section-title">Account Information</h3>
      <div class="profile-info-grid">
        <div class="profile-info-item">
          <span class="profile-label">Email</span>
          <span class="profile-value" id="profileEmail">--</span>
        </div>
        <div class="profile-info-item">
          <span class="profile-label">Phone</span>
          <span class="profile-value" id="profilePhone">--</span>
        </div>
        <div class="profile-info-item">
          <span class="profile-label">Member Since</span>
          <span class="profile-value" id="profileDate">--</span>
        </div>
        <div class="profile-info-item">
          <span class="profile-label">Verified</span>
          <span class="profile-value" id="profileVerified">--</span>
        </div>
      </div>
    </div>

    <div class="profile-actions">
      <button class="btn-auth-submit" onclick="handleLogout()" style="background: var(--error); margin-top: 16px;">
        Logout
      </button>
    </div>

    <div class="auth-trust" style="margin-top: 24px;">
      <span class="trust-icon">🛡️</span>
      <span>Your account is protected by BuyBridge</span>
    </div>

  </main>

  <div id="bottomNav"></div>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
    }

    initHeader('My Profile', null);
    document.getElementById('bottomNav').innerHTML = getBuyerBottomNav('profile');

    async function loadProfile() {
      try {
        const data = await apiVerifyToken();
        const user = data.user;
        
        document.getElementById('profileName').textContent = user.full_name;
        document.getElementById('profileRole').textContent = user.role === 'seller' ? 'Seller' : user.role === 'admin' ? 'Admin' : 'Buyer';
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('profilePhone').textContent = user.phone || 'Not set';
        document.getElementById('profileDate').textContent = new Date(user.created_at).toLocaleDateString();
        document.getElementById('profileVerified').textContent = user.is_verified ? '✅ Verified' : '⏳ Pending';
        
        setUser(user);
      } catch (error) {
        const user = getUser();
        if (user) {
          document.getElementById('profileName').textContent = user.full_name || 'User';
          document.getElementById('profileEmail').textContent = user.email || '--';
          document.getElementById('profilePhone').textContent = user.phone || '--';
        }
      }
    }

    loadProfile();
  </script>

</body>
</html>
