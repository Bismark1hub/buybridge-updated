<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <div class="form-section" style="margin-top: 12px;">
      <div class="form-group">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-input" id="productName" placeholder="Product name">
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input form-textarea" id="productDescription" placeholder="Describe your product..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Price (GHS)</label>
        <input type="number" class="form-input" id="productPrice" placeholder="0.00" step="0.01">
      </div>

      <div class="form-group">
        <label class="form-label">Quantity Available</label>
        <input type="number" class="form-input" id="productQuantity" placeholder="1" min="1">
      </div>

      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input" id="productStatus">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="sold_out">Sold Out</option>
        </select>
      </div>

      <button class="btn-auth-submit" onclick="updateProduct()">Save Changes</button>
      <button class="btn-auth-submit" onclick="deleteProduct()" style="background: var(--error); margin-top: 8px;">Delete Product</button>
    </div>

  </main>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    if (!isLoggedIn() || getUserRole() !== 'seller') {
      window.location.href = 'login.html';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    initHeader('Edit Product', 'seller-dashboard.html');

    async function loadProduct() {
      if (!productId) {
        window.location.href = 'seller-dashboard.html';
        return;
      }

      try {
        const data = await apiGetProduct(productId);
        const p = data.product;
        
        document.getElementById('productName').value = p.name || '';
        document.getElementById('productDescription').value = p.description || '';
        document.getElementById('productPrice').value = p.price || '';
        document.getElementById('productQuantity').value = p.quantity_available || 1;
        document.getElementById('productStatus').value = p.status || 'active';
      } catch (error) {
        showToast('Product not found', 'error');
        setTimeout(() => window.location.href = 'seller-dashboard.html', 1000);
      }
    }

    async function updateProduct() {
      try {
        await apiUpdateProduct({
          productId,
          name: document.getElementById('productName').value.trim(),
          description: document.getElementById('productDescription').value.trim(),
          price: parseFloat(document.getElementById('productPrice').value),
          quantity: parseInt(document.getElementById('productQuantity').value),
          status: document.getElementById('productStatus').value
        });
        showToast('Product updated!', 'success');
        setTimeout(() => window.location.href = 'seller-dashboard.html', 500);
      } catch (error) {}
    }

    async function deleteProduct() {
      if (!confirm('Are you sure you want to delete this product?')) return;
      
      try {
        await apiUpdateProduct({ productId, status: 'inactive' });
        showToast('Product deleted', 'success');
        setTimeout(() => window.location.href = 'seller-dashboard.html', 500);
      } catch (error) {}
    }

    loadProduct();
  </script>

</body>
</html>
