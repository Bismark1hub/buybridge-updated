<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store - BuyBridge</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header" id="mainHeader"></header>

  <main class="main-content">

    <div class="storefront-cover">
      <div class="cover-placeholder" id="coverName">Store</div>
    </div>

    <div class="storefront-info">
      <div class="storefront-avatar">🏪</div>
      <div class="storefront-details">
        <h1 class="storefront-name" id="sfName">
          Loading...
          <span class="verified-badge" id="verifiedBadge" style="display:none;">✓ Verified</span>
        </h1>
        <div class="storefront-rating" id="sfRating">⭐ --</div>
        <p class="storefront-desc" id="sfDesc">Loading store information...</p>
        <div class="storefront-meta">
          <span id="sfAddress">📍 --</span>
        </div>
      </div>
    </div>

    <button class="btn-contact-seller">💬 Contact Seller</button>

    <div class="section-header">
      <h2 class="section-title">All Products</h2>
      <span class="section-link" id="productCount">--</span>
    </div>

    <div class="product-grid" id="storeProducts">
      <p style="text-align: center; color: var(--text-light); padding: 20px;">Loading products...</p>
    </div>

    <div class="storefront-footer">
      <span>Powered by</span>
      <span class="footer-brand">🌉 BuyBridge</span>
      <span class="footer-tagline">Buy with confidence</span>
    </div>

  </main>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const sellerId = urlParams.get('user_id');

    initHeader(null, '../index.html');

    async function loadStorefront() {
      if (!sellerId) {
        showToast('Store not found', 'error');
        return;
      }

      try {
        const profileData = await apiGetSellerProfile(sellerId);
        const profile = profileData.profile;

        document.getElementById('coverName').textContent = profile.business_name;
        document.getElementById('sfName').innerHTML = `${profile.business_name} <span class="verified-badge">✓ Verified</span>`;
        document.getElementById('sfDesc').textContent = profile.store_description || 'No description available.';
        document.getElementById('sfAddress').textContent = `📍 ${profile.business_address || 'Ghana'}`;
        document.getElementById('sfRating').textContent = `⭐ ${profile.rating || 'New'}`;

        document.title = `${profile.business_name} - BuyBridge`;

        // Load seller's products
        const productsData = await apiListProducts();
        const sellerProducts = (productsData.products || []).filter(p => p.seller_id === sellerId);
        document.getElementById('productCount').textContent = `${sellerProducts.length} products`;

        document.getElementById('storeProducts').innerHTML = sellerProducts.length === 0
          ? '<p style="text-align: center; color: var(--text-light); padding: 20px;">No products yet.</p>'
          : sellerProducts.map(p => `
            <a href="product-detail.html?id=${p.id}" class="product-card">
              <div class="product-image">
                ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : '<div class="image-placeholder">📦</div>'}
              </div>
              <div class="product-info">
                <h3 class="product-name">${p.name}</h3>
                <p class="product-price">GHS ${parseFloat(p.price).toLocaleString()}</p>
                <div class="product-meta">
                  <span class="product-seller">${profile.business_name}</span>
                  <span class="product-rating">⭐ ${p.rating || 'New'}</span>
                </div>
              </div>
            </a>
          `).join('');

      } catch (error) {
        document.getElementById('sfName').textContent = 'Store Not Available';
        document.getElementById('sfDesc').textContent = 'This seller\'s storefront isn\'t available.';
      }
    }

    loadStorefront();
  </script>

</body>
</html>
